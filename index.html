<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Summer I Turned Into an LLC PF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================== BASE ===================== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  color: #2B2B2B;
  background: #e9dfc6;
}

#root {
  position: relative;
  min-height: 100vh;
  padding: 28px 16px 60px;
  overflow-x: hidden;
}

.scrapbook-bg {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  opacity: 0.28;
  pointer-events: none;
}

#root > *:not(.scrapbook-bg) {
  position: relative;
  z-index: 1;
}

.hidden { display: none !important; }

/* ===================== LOADING / ERROR ===================== */
.loading-shell { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
.loading-text { font-family: 'Special Elite', monospace; color: #001E51; }
.error-box {
  max-width: 340px;
  margin: 60px auto;
  text-align: center;
  padding: 24px;
  background: #fffdf8;
  border: 2px solid #001E51;
  border-radius: 8px;
}
.error-title { font-family: 'Special Elite', monospace; font-size: 18px; color: #001E51; margin: 0 0 10px; }
.error-sub { font-size: 13px; color: #5b5b54; line-height: 1.5; margin: 0; }

/* ===================== NAV ===================== */
.nav-bar { display: flex; gap: 8px; max-width: 640px; margin: 0 auto 18px; }
.nav-btn {
  display: flex; align-items: center; gap: 5px;
  background: none; border: 1.5px solid #001E51; border-radius: 6px;
  color: #001E51; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 13px;
  cursor: pointer; padding: 6px 12px;
}
.nav-btn:hover { background: #eef6f8; }
.nav-btn:focus-visible { outline: 3px solid #0080A2; }
.nav-icon { font-size: 14px; line-height: 1; }

/* ===================== HOMEPAGE / MASTHEAD ===================== */
.homepage { max-width: 480px; margin: 40px auto 0; text-align: center; }
.masthead {
  max-width: 720px; margin: 0 auto 28px; text-align: center;
  background: #001E51; border-radius: 8px; padding: 22px 18px;
  border-bottom: 4px solid #FAC507;
}
.masthead-eyebrow {
  font-family: 'Special Elite', monospace; font-size: 12px; letter-spacing: 0.12em;
  text-transform: uppercase; color: #FAC507; margin: 0 0 6px;
}
.masthead-title {
  font-family: 'Special Elite', monospace; font-size: clamp(20px, 5vw, 32px);
  color: #fff; margin: 0 0 8px; letter-spacing: 0.01em; line-height: 1.3;
}
.masthead-sub { margin: 0; font-size: 14px; color: #cfe3ec; }

.home-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
.home-btn {
  font-family: 'Special Elite', monospace; font-size: 16px; padding: 16px; border-radius: 6px;
  border: 2px solid #001E51; background: #fffdf8; color: #001E51; cursor: pointer;
}
.home-btn:hover { background: #f0ecdf; }
.home-btn:focus-visible { outline: 3px solid #0080A2; outline-offset: 2px; }
.home-btn-primary { background: #001E51; color: #F7F3E9; }
.home-btn-primary:hover { background: #0a2d70; }
.home-current-user { margin-top: 18px; font-size: 13px; color: #5b5b54; }
.link-btn { background: none; border: none; color: #0080A2; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: underline; padding: 0; }
.manage-pin-link { display: block; margin: 0 0 12px; }
.you-tag { font-size: 9px; font-weight: 700; color: #0080A2; text-transform: uppercase; border: 1px solid #0080A2; border-radius: 3px; padding: 1px 4px; margin-left: 4px; }

/* ===================== WHO SELECT ===================== */
.who-bar { max-width: 480px; margin: 0 auto 24px; display: flex; flex-direction: column; gap: 6px; }
.who-label { font-size: 12px; font-weight: 600; color: #001E51; text-transform: uppercase; letter-spacing: 0.06em; }
.who-select {
  font-family: 'Inter', sans-serif; font-size: 15px; padding: 10px 12px;
  border: 2px solid #001E51; border-radius: 4px; background: #fff; color: #2B2B2B;
}
.who-select:focus-visible { outline: 3px solid #0080A2; outline-offset: 1px; }

/* ===================== BOARD ===================== */
.my-board-section { max-width: 640px; margin: 0 auto 40px; }
.board-header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
.board-name { font-family: 'Special Elite', monospace; font-size: 20px; color: #001E51; margin: 0; display: flex; align-items: center; gap: 6px; }
.lock-icon { font-size: 15px; }
.lock-icon-sm { font-size: 11px; }

.progress-wrap { display: flex; align-items: center; gap: 10px; }
.progress-track { width: 130px; height: 8px; background: #e3ddc9; border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; background: #0080A2; transition: width 0.4s ease; }
.progress-label { font-size: 12px; color: #5b5b54; white-space: nowrap; }

.lock-note { font-size: 13px; color: #0080A2; font-weight: 600; margin: 0 0 12px; }
.hint-text { font-size: 12px; color: #8a8a7e; margin: 10px 2px 0; text-align: center; }

.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #001E51; padding: 6px; border-radius: 6px; }

.cell {
  position: relative; width: 100%; aspect-ratio: 1; background: #fffdf8; border: none; border-radius: 3px;
  padding: 6px 4px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
  overflow: hidden; cursor: default; font-family: 'Inter', sans-serif;
}
.cell-clickable { cursor: pointer; }
.cell-clickable:hover { background: #eef6f8; }
.cell-clickable:focus-visible { outline: 3px solid #0080A2; outline-offset: 2px; }
.cell-done { cursor: pointer; }
.cell-free { background: #0080A2; cursor: default; }
.free-mark { color: #fff; font-family: 'Special Elite', monospace; font-size: 11px; text-align: center; line-height: 1.3; }
.cell-locked { opacity: 0.55; cursor: not-allowed; }
.lock-mark { position: absolute; top: 4px; right: 4px; font-size: 12px; z-index: 1; }
.cell-prompt { font-size: 9.5px; line-height: 1.15; text-align: center; color: #2B2B2B; position: relative; z-index: 1; }
.cell-free .cell-prompt { display: none; }
.cell-photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
.cell-done .cell-prompt { position: absolute; bottom: 3px; background: rgba(255,253,248,0.88); width: 100%; padding: 2px 3px; left: 0; }

.stamp { position: absolute; top: 50%; left: 50%; margin-top: -23px; margin-left: -23px; pointer-events: none; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.15)); }

/* ===================== LEADERBOARD / TEAM ===================== */
.leaderboard { max-width: 640px; margin: 20px auto 0; }
.leaderboard-list { display: flex; flex-direction: column; gap: 6px; }
.lb-row {
  display: grid; grid-template-columns: 22px 1fr auto; grid-template-areas: "rank name stat" "rank count last";
  align-items: center; gap: 2px 8px; background: #fffdf8; border: 2px solid #001E51; border-radius: 5px;
  padding: 10px 12px; cursor: pointer; text-align: left; font-family: 'Inter', sans-serif; width: 100%;
}
.lb-row:hover { background: #eef6f8; }
.lb-row:focus-visible { outline: 3px solid #0080A2; outline-offset: 2px; }
.lb-row-active { border-color: #0080A2; background: #e6f3f7; }
.lb-rank { grid-area: rank; font-family: 'Special Elite', monospace; color: #0080A2; font-size: 14px; }
.lb-name { grid-area: name; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 4px; }
.lb-stat { grid-area: stat; font-size: 12px; }
.lb-bingo { color: #001E51; font-weight: 700; background: #FAC507; padding: 2px 6px; border-radius: 3px; }
.lb-line { color: #5b5b54; }
.lb-count { grid-area: count; font-size: 12px; color: #001E51; font-weight: 600; }
.lb-last { grid-area: last; font-size: 11px; color: #8a8a7e; text-align: right; }

.team-section { max-width: 640px; margin: 0 auto; }
.team-heading { font-family: 'Special Elite', monospace; font-size: 18px; color: #001E51; margin: 0 0 14px; }
.team-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 480px) { .team-grid { grid-template-columns: repeat(4, 1fr); } }
.team-card {
  background: #fffdf8; border: 2px solid #001E51; border-radius: 5px; padding: 10px; text-align: left;
  cursor: pointer; display: flex; flex-direction: column; gap: 6px; font-family: 'Inter', sans-serif; width: 100%;
}
.team-card:hover { background: #eef6f8; }
.team-card:focus-visible { outline: 3px solid #0080A2; outline-offset: 2px; }
.team-card-active { border-color: #0080A2; background: #e6f3f7; }
.team-card-name { font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 4px; }
.team-card-count { font-size: 12px; color: #5b5b54; }
.mini-track { height: 5px; background: #e3ddc9; border-radius: 3px; overflow: hidden; }
.mini-fill { height: 100%; background: #0080A2; }

/* ===================== MODALS ===================== */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,30,81,0.55); display: flex; align-items: center;
  justify-content: center; padding: 16px; z-index: 50;
}
.modal { background: #F7F3E9; border: 2px solid #001E51; border-radius: 6px; max-width: 400px; width: 100%; padding: 22px; }
.entry-modal { max-width: 360px; }
.modal-eyebrow { font-family: 'Special Elite', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: #0080A2; margin: 0 0 4px; }
.modal-title { font-family: 'Special Elite', monospace; font-size: 18px; color: #001E51; margin: 0 0 12px; text-align: center; }
.modal-sub { font-size: 13px; color: #5b5b54; margin: 0 0 14px; line-height: 1.4; }
.dropzone {
  border: 2px dashed #001E51; border-radius: 5px; min-height: 160px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; overflow: hidden; background: #fffdf8;
}
.dropzone-text { color: #5b5b54; font-size: 14px; }
.dropzone-preview { width: 100%; height: 100%; object-fit: cover; }
.modal-error { color: #b3422a; font-size: 13px; margin: 8px 0 0; }
.modal-actions { display: flex; justify-content: center; gap: 14px; margin-top: 18px; flex-wrap: wrap; }
.btn-ghost, .btn-primary {
  font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; padding: 9px 16px; border-radius: 4px; cursor: pointer;
}
.btn-ghost { background: transparent; border: 2px solid #001E51; color: #001E51; }
.btn-primary { background: #0080A2; border: 2px solid #0080A2; color: #fff; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-text-danger-solid { background: none; border: none; color: #b3422a; font-size: 13px; font-weight: 600; cursor: pointer; }

.pin-input {
  width: 100%; font-size: 22px; letter-spacing: 0.5em; text-align: center; padding: 12px;
  border: 2px solid #001E51; border-radius: 4px; font-family: 'Inter', sans-serif; background: #fffdf8;
}

.entry-photo { width: 100%; border-radius: 5px; margin: 4px 0 10px; display: block; }
.entry-meta { font-size: 12px; color: #5b5b54; margin: 0 0 4px; text-align: center; }
.entry-no-reactions { font-size: 12px; color: #8a8a7e; text-align: center; margin: 4px 0 0; }

.reaction-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 14px 0 6px; }
.reaction-pill {
  display: flex; align-items: center; gap: 4px; background: #F7F3E9; border: 1.5px solid #001E51;
  border-radius: 14px; padding: 5px 9px; font-size: 15px; cursor: pointer;
}
.reaction-pill-active { background: #e6f3f7; border-color: #0080A2; }
.reaction-count { font-size: 11px; color: #5b5b54; font-weight: 600; }

/* ===================== COMMENTS ===================== */
.comments-section { margin-top: 14px; border-top: 1px solid #e3ddc9; padding-top: 12px; }
.comments-list { max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.comment-row {
  background: #F7F3E9; border-radius: 6px; padding: 6px 8px; font-size: 12px; line-height: 1.4;
  display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
}
.comment-row-editing { gap: 6px; flex-wrap: nowrap; }
.comment-author { font-weight: 700; color: #001E51; margin-right: 5px; }
.comment-text { color: #2B2B2B; word-break: break-word; flex: 1; }
.comment-actions { display: flex; gap: 6px; margin-left: auto; }
.comment-mini-btn { background: none; border: none; color: #0080A2; font-size: 10px; font-weight: 600; cursor: pointer; padding: 2px 4px; text-decoration: underline; }
.comment-mini-btn-danger { color: #b3422a; }
.comment-input-row { display: flex; gap: 6px; }
.comment-input { flex: 1; font-family: 'Inter', sans-serif; font-size: 13px; padding: 8px 10px; border: 1.5px solid #001E51; border-radius: 6px; background: #fffdf8; }
.comment-send { background: #0080A2; color: #fff; border: none; border-radius: 6px; padding: 0 14px; font-weight: 600; font-size: 13px; cursor: pointer; }
.comment-send:disabled { opacity: 0.5; cursor: not-allowed; }
.comment-char-count { font-size: 10px; color: #8a8a7e; text-align: right; margin: 4px 2px 0; }

/* ===================== DEBUG PANEL ===================== */
.debug-bar { max-width: 640px; margin: 0 auto 12px; text-align: center; }
.debug-toggle-inline { background: #C4622D; color: #fff; border: 2px solid #001E51; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; }
.debug-panel-inline { max-width: 640px; margin: 0 auto 20px; max-height: 50vh; background: #0a0a0a; color: #6f6; border-radius: 8px; font-family: monospace; font-size: 11px; display: flex; flex-direction: column; box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
.debug-panel-header { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-bottom: 1px solid #333; color: #fff; }
.debug-panel-header button { background: none; border: none; color: #fff; cursor: pointer; font-size: 14px; }
.debug-panel-body { overflow-y: auto; padding: 8px 10px; }
.debug-line { white-space: pre-wrap; word-break: break-word; margin-bottom: 4px; }

@media (prefers-reduced-motion: reduce) { .progress-fill { transition: none; } }
</style>
</head>
<body>

<div id="root">
  <svg class="scrapbook-bg" viewBox="0 0 1080 1000" preserveAspectRatio="xMidYMid slice" aria-hidden="true" id="scrapbook-svg"></svg>
  <div class="loading-shell"><p class="loading-text">Unrolling the field log...</p></div>
</div>

</body>
</html>
